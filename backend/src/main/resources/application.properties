# ================================================
# Urban Nest - Application Configuration
# ================================================

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/realestate_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:user1}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- File Upload ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Mail (SMTP via Gmail) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:realestateddu@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jgsrheydqjacgklz}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Server ---
server.port=8083

# --- App Custom Config ---
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# --- Path Matching ---
spring.mvc.pathmatch.trailing-slash-matching=true
